<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spend It All</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #00d4ff;
      --accent-dim: rgba(0,212,255,0.10);
      --bg: #0a0a0f;
      --bg-warm: #0d0d14;
      --surface: #111118;
      --surface-solid: #111118;
      --surface2: #1a1a24;
      --surface3: #22222e;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #e0e0e8;
      --text-muted: #6a6a80;
      --text-dim: #33334a;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }

    /* ── SCENARIO THEMES ─────────────────────── */
    body.s-elon     { --accent:#00d4ff; --accent-dim:rgba(0,212,255,.10); }
    body.s-debt     { --accent:#ff5c5c; --accent-dim:rgba(255,92,92,.10); }
    body.s-powerball{ --accent:#ffcc00; --accent-dim:rgba(255,204,0,.10); }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.008) 2px,
        rgba(255,255,255,0.008) 4px
      );
      pointer-events: none;
    }

    /* ── HEADER / HUD ────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
    }
    .header-inner {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0;
    }

    /* Single-line HUD bar */
    .header-bar {
      display: flex;
      align-items: center;
      height: 52px;
      padding: 0 1rem;
      gap: 0;
    }

    /* Logo block */
    .hud-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      cursor: pointer;
      user-select: none;
      padding-right: 0.75rem;
      border-right: 1px solid var(--border);
      height: 100%;
      transition: opacity 0.15s;
    }
    .hud-logo:hover { opacity: 0.7; }
    .hud-logo-icon {
      font-size: 1.3rem;
      line-height: 1;
    }
    .hud-logo-text {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--accent);
      white-space: nowrap;
      text-transform: uppercase;
      transition: color 0.35s;
    }

    /* Menu button */
    .btn-menu {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      height: 100%;
      padding: 0 0.85rem;
      border: none;
      border-right: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font: 700 0.65rem/1 var(--font-body);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .btn-menu:hover {
      color: var(--accent);
      background: var(--accent-dim);
    }
    .btn-menu-icon {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .btn-menu-icon span {
      display: block;
      width: 14px;
      height: 1.5px;
      background: currentColor;
    }

    /* Scenario label */
    .sc-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 0 1rem;
      white-space: nowrap;
      border-right: 1px solid var(--border);
      height: 100%;
      display: flex;
      align-items: center;
    }

    /* Stats section */
    .hud-stats {
      display: flex;
      align-items: center;
      height: 100%;
      flex-shrink: 0;
    }
    .hud-stat {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0 1rem;
      height: 100%;
      border-right: 1px solid var(--border);
    }
    .hud-stat-lbl {
      font-size: 0.55rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .hud-stat-val {
      font-family: var(--font-mono);
      font-size: clamp(0.55rem, 1.1vw, 0.85rem);
      font-weight: 800;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      transition: color 0.35s;
    }
    .hud-stat-val.stat-remaining {
      color: #4ade80;
    }
    .hud-stat-val.stat-spent {
      color: #ff5555;
    }

    /* Spacer */
    .hud-spacer { flex: 1; }

    /* Summary button in header */
    .btn-summary {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      height: 100%;
      padding: 0 1rem;
      border: none;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font: 700 0.65rem/1 var(--font-body);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .btn-summary:hover {
      color: var(--accent);
      background: var(--accent-dim);
    }
    .btn-summary-icon {
      font-size: 0.85rem;
    }

    /* Mute button */
    .btn-mute {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 48px;
      border: none;
      border-left: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      color: var(--text-muted);
      transition: color 0.15s, background 0.15s;
      padding: 0;
    }
    .btn-mute:hover {
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── PROGRESS BAR ────────────────────────── */
    .progress-track {
      height: 3px;
      background: var(--surface2);
      border-radius: 9999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 9999px;
      /* spring overshoot easing */
      transition: width 0.55s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.35s;
    }
    @keyframes milestoneFlash {
      0%, 100% { filter: brightness(1); }
      35%       { filter: brightness(2.8); }
    }
    .progress-fill.milestone-flash { animation: milestoneFlash 0.55s ease; }

    @keyframes flashBuy  { 0%,100%{color:var(--accent)} 40%{color:#ff5555} }
    @keyframes flashSell { 0%,100%{color:var(--accent)} 40%{color:#4ade80} }
    .flash-buy  { animation: flashBuy  0.4s ease; }
    .flash-sell { animation: flashSell 0.4s ease; }

    /* ── SHAKE / SQUISH / WAVE ANIMATIONS ───────── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%       { transform: translateX(-6px); }
      35%       { transform: translateX(6px); }
      55%       { transform: translateX(-4px); }
      75%       { transform: translateX(3px); }
      90%       { transform: translateX(-1px); }
    }
    .card-shake { animation: shake 0.38s ease; }
    .bal-shake  { animation: shake 0.38s ease; }

    @keyframes btnSquish {
      0%   { transform: scale(1); }
      25%  { transform: scale(0.75); }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .btn-squish { animation: btnSquish 0.22s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    @keyframes wavePop {
      0%   { opacity: 0.25; transform: scale(0.95); }
      55%  { transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1); }
    }
    .wave-pop { animation: wavePop 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    /* ── ODOMETER ────────────────────────────── */
    .od-char { display: inline-block; }
    @keyframes odIn  {
      from { transform: translateY(55%); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    @keyframes odOut {
      from { transform: translateY(0);    opacity: 1; }
      to   { transform: translateY(-55%); opacity: 0; }
    }
    .od-char.od-in  { animation: odIn  0.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .od-char.od-out { animation: odOut 0.1s ease-in forwards; }

    /* ── INTRO SCREEN ────────────────────────── */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 1;
      transition: opacity 0.4s ease, visibility 0.4s;
      overflow: hidden;
    }
    .intro.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Crosshair grid background */
    .intro::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }
    .intro::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border: 1px solid rgba(255,255,255,0.03);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Floating particles */
    .intro-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.06;
      animation: floatUp linear infinite;
      will-change: transform;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.06; }
      90% { opacity: 0.06; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .intro-inner {
      max-width: 520px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .intro-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.45rem 1rem;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 1.5rem;
    }
    .intro-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .intro-title {
      font-size: clamp(2.5rem, 8vw, 4.2rem);
      font-weight: 900;
      letter-spacing: -0.06em;
      color: var(--text);
      margin-bottom: 0.5rem;
      line-height: 1;
      text-transform: uppercase;
    }
    .intro-title-accent {
      color: var(--accent);
    }

    .intro-sub {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      font-weight: 500;
    }

    .intro-options-label {
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 0.75rem;
    }

    .intro-options {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .intro-opt {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
    }
    .intro-opt:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .intro-opt:active { transform: scale(0.995); }

    .intro-opt-icon {
      width: 48px;
      height: 48px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }
    .intro-opt:hover .intro-opt-icon {
      border-color: var(--accent);
    }
    .intro-opt-text { flex: 1; min-width: 0; }
    .intro-opt-name {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 0.15rem;
      letter-spacing: -0.01em;
    }
    .intro-opt-detail {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.35;
    }
    .intro-opt-budget {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--accent);
      flex-shrink: 0;
      transition: color 0.35s;
    }

    .intro-opt[data-id="elon"]:hover { --accent: #00d4ff; --accent-dim: rgba(0,212,255,0.10); }
    .intro-opt[data-id="debt"]:hover { --accent: #ff5c5c; --accent-dim: rgba(255,92,92,0.10); }
    .intro-opt[data-id="powerball"]:hover { --accent: #ffcc00; --accent-dim: rgba(255,204,0,0.10); }

    .intro-footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    /* ── GRID ────────────────────────────────── */
    .main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 1.25rem;
      position: relative;
      z-index: 1;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 0.6rem;
    }

    /* ── CARD ────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      transition: all 0.15s ease;
      position: relative;
    }

    .card:not(.impossible):not(.broke):not(.maxed):hover {
      background: var(--surface2);
      border-color: var(--border-hover);
    }

    .card.owned {
      border-color: var(--accent);
      background: var(--surface2);
    }
    .card.broke { opacity: 0.3; }
    .card.impossible { opacity: 0.18; cursor: default; }
    .card.maxed { opacity: 0.4; }


    @keyframes cardPurchase {
      0% { background: var(--accent-dim); }
      100% { background: var(--surface2); }
    }
    .card.pulse-buy { animation: cardPurchase 0.35s ease-out; }

    .card-emoji {
      font-size: 1.8rem;
      line-height: 1;
    }
    .card-name {
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .card-price {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      transition: color 0.35s;
      word-break: break-all;
    }
    .card-desc {
      font-size: 0.68rem;
      color: var(--text-muted);
      line-height: 1.4;
      flex: 1;
    }
    .impossible-badge {
      display: inline-block;
      font-size: 0.55rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: rgba(255,68,68,0.12);
      color: #f87171;
      border: 1px solid rgba(255,68,68,0.25);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      margin-left: 0.3rem;
      vertical-align: middle;
    }

    .card-controls {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-top: 0.35rem;
    }
    .btn-q {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text);
      font: 700 1.1rem/1 var(--font-body);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s ease;
      flex-shrink: 0;
    }
    .btn-q:not(:disabled):hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .btn-q:disabled { opacity: 0.2; cursor: not-allowed; }
    .btn-buy:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .qty-inp {
      flex: 1;
      min-width: 0;
      text-align: center;
      font: 700 0.85rem/1 var(--font-mono);
      font-variant-numeric: tabular-nums;
      color: var(--text-dim);
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      cursor: text;
      transition: color 0.15s, background 0.15s;
      border-radius: 4px;
      padding: 4px 0;
    }
    .qty-inp:focus {
      background: var(--surface3);
      color: var(--text);
    }
    .qty-inp.nonzero { color: var(--accent); }
    .qty-inp::-webkit-inner-spin-button,
    .qty-inp::-webkit-outer-spin-button { -webkit-appearance: none; }
    .qty-inp[type=number] { -moz-appearance: textfield; appearance: textfield; }

    /* ── ACTIONS BAR (hidden, moved to header) ─ */
    .actions-bar {
      display: none;
    }

    /* ── OVERLAY ─────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface-solid);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 2rem;
      max-width: 560px;
      width: 100%;
      max-height: 82vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 0.35rem;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }
    .modal-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .receipt { display: flex; flex-direction: column; margin-bottom: 1.5rem; }
    .receipt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      gap: 0.5rem;
      transition: background 0.1s;
    }
    .receipt-row:hover {
      background: rgba(255,255,255,0.02);
    }
    .receipt-row:last-child {
      border-bottom: none;
      font-weight: 700;
      font-size: 0.95rem;
      border-top: 2px solid var(--accent);
      margin-top: 0.3rem;
      padding-top: 0.75rem;
    }
    .receipt-name { display: flex; align-items: center; gap: 0.5rem; min-width: 0; }
    .receipt-name span:last-child { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .receipt-total {
      font-family: var(--font-mono);
      color: var(--accent);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      transition: color 0.35s;
      font-size: 0.82rem;
    }
    .receipt-empty { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.875rem; }

    .modal-btns { display: flex; gap: 0.5rem; }
    .btn-continue {
      flex: 1;
      padding: 0.85rem;
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
      border-radius: 8px;
      font: 800 0.8rem/1 var(--font-body);
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .btn-continue:hover {
      background: var(--accent-dim);
    }
    .btn-reset {
      flex: 1;
      padding: 0.85rem;
      background: var(--accent);
      color: #000;
      border: 2px solid var(--accent);
      border-radius: 8px;
      font: 800 0.8rem/1 var(--font-body);
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .btn-reset:hover {
      opacity: 0.85;
    }

    /* ── CONFETTI ─────────────────────────────── */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 250;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      top: -10px;
      animation: confettiFall linear forwards;
      will-change: transform;
    }
    @keyframes confettiFall {

    /* ── ACHIEVEMENTS MODAL ─────────────────────── */

      /* ── Footer ──────────────────────────────── */

    }

    /* Reduce motion for accessibility */

      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;

  </style>
</head>

<script>
// ── SOUND ENGINE ─────────────────────────────────────────────────────────────

const SFX = (() => {
  let ctx = null;
  let noiseBuf = null;
  let muted = localStorage.getItem('spend-it-all-muted') === '1';

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    if (!noiseBuf) {
      noiseBuf = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    }
    return ctx;
  }

  function tone(freq, type, start, dur, peak, attack) {
    const c = getCtx();
    const atk = attack || 0.003;
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(peak, start + atk);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(g).connect(c.destination);
    osc.start(start);
    osc.stop(start + dur + 0.01);
  }

  function filteredTone(freq, type, start, dur, peak, fType, fFreq, attack) {
    const c = getCtx();
    const atk = attack || 0.003;
    const osc = c.createOscillator();
    const flt = c.createBiquadFilter();
    const g = c.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    flt.type = fType;
    flt.frequency.value = fFreq;
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(peak, start + atk);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(flt).connect(g).connect(c.destination);
    osc.start(start);
    osc.stop(start + dur + 0.01);
  }

  function noise(start, dur, fType, fFreq, fQ, peak, attack) {
    const c = getCtx();
    const atk = attack || 0.001;
    const src = c.createBufferSource();
    src.buffer = noiseBuf;
    const flt = c.createBiquadFilter();
    flt.type = fType;
    flt.frequency.value = fFreq;
    flt.Q.value = fQ;
    const g = c.createGain();
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(peak, start + atk);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    src.connect(flt).connect(g).connect(c.destination);
    src.start(start);
    src.stop(start + dur + 0.01);
  }

  function noiseSweep(start, dur, fType, fStart, fEnd, fQ, peak, attack) {
    const c = getCtx();
    const atk = attack || 0.005;
    const src = c.createBufferSource();
    src.buffer = noiseBuf;
    const flt = c.createBiquadFilter();
    flt.type = fType;
    flt.frequency.setValueAtTime(fStart, start);
    flt.frequency.exponentialRampToValueAtTime(fEnd, start + dur);
    flt.Q.value = fQ;
    const g = c.createGain();
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(peak, start + atk);
    g.gain.setValueAtTime(peak, start + dur * 0.4);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    src.connect(flt).connect(g).connect(c.destination);
    src.start(start);
    src.stop(start + dur + 0.01);
  }

  function metallic(freq, ratios, start, dur, peak, attack) {
    const atk = attack || 0.001;
    const perPartial = peak / ratios.length;
    ratios.forEach(r => tone(freq * r, 'sine', start, dur, perPartial, atk));
  }

  function sweep(startF, endF, type, start, dur, peak, attack) {
    const c = getCtx();
    const atk = attack || 0.003;
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(startF, start);
    osc.frequency.exponentialRampToValueAtTime(endF, start + dur);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(peak, start + atk);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(g).connect(c.destination);
    osc.start(start);
    osc.stop(start + dur + 0.01);
  }

  const sounds = {
    buy() {
      const t = getCtx().currentTime;
      noise(t, 0.025, 'highpass', 3000, 0.7, 0.08);
      noise(t, 0.04,  'bandpass', 800,  1.5, 0.04);
      noise(t + 0.058, 0.015, 'bandpass', 5000, 2.0, 0.06);
      metallic(2200, [1, 1.5, 2.42, 3.14], t + 0.06, 0.35, 0.10);
      tone(1100, 'sine', t + 0.06, 0.30, 0.06, 0.002);
      tone(4400, 'sine', t + 0.065, 0.15, 0.015);
    },
    sell() {
      const t = getCtx().currentTime;
      tone(3200, 'sine', t, 0.12, 0.03);
      tone(3208, 'sine', t, 0.12, 0.03);
      tone(1600, 'sine', t, 0.15, 0.03, 0.002);
      sweep(2400, 1200, 'sine', t, 0.12, 0.025);
      noise(t, 0.01, 'highpass', 4000, 0.5, 0.03);
    },
    bulkBuy() {
      const t = getCtx().currentTime;
      noise(t, 0.025, 'highpass', 3000, 0.7, 0.08);

function toggleMute() {
  const wasMuted = SFX.isMuted();
  if (!wasMuted) SFX.play('muteOn'); // play before muting so it's heard
  const m = SFX.toggle();
  if (!m) SFX.play('muteOff');       // play after unmuting
  document.getElementById('muteBtn').textContent = m ? '🔇' : '🔊';
}

// ── CONFETTI ─────────────────────────────────────────────────────────────────

function launchConfetti() {
  const container = document.getElementById('confetti');
  container.innerHTML = '';
  const colors = ['#00d4ff','#ff5c5c','#ffcc00','#a855f7','#4ade80','#f472b6','#fb923c'];
  const shapes = ['circle','square','triangle'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    const size = 6 + Math.random() * 6;
    piece.style.left = Math.random() * 100 + '%';
    piece.style.width = size + 'px';
    piece.style.height = size + 'px';
    piece.style.background = color;
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.animationDelay = Math.random() * 0.8 + 's';
    if (shape === 'circle') piece.style.borderRadius = '50%';
    else if (shape === 'triangle') {
      piece.style.background = 'transparent';
      piece.style.width = '0';
      piece.style.height = '0';
      piece.style.borderLeft = size/2 + 'px solid transparent';
      piece.style.borderRight = size/2 + 'px solid transparent';
      piece.style.borderBottom = size + 'px solid ' + color;
    }
    container.appendChild(piece);
  }
  setTimeout(() => container.innerHTML = '', 5000);
}

// ── INTRO PARTICLES ──────────────────────────────────────────────────────────

function createIntroParticles() {
  const container = document.getElementById('introParticles');
  const emojis = ['💵','💰','💎','🪙','💳','🏦','💲','🤑','📈','🎰'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = -(Math.random() * 20) + 's';
    container.appendChild(p);
  }
}

function fmt(n) {
  if (n >= 1e15) return '$' + trim((n/1e15).toFixed(1)) + ' quadrillion';
  if (n >= 1e12) return '$' + trim((n/1e12).toFixed(3)) + 'T';
  if (n >= 1e9)  return '$' + trim((n/1e9 ).toFixed(3)) + 'B';
  if (n >= 1e6)  return '$' + trim((n/1e6 ).toFixed(3)) + 'M';
  if (n >= 1e3)  return '$' + Math.round(n).toLocaleString('en-US');
  return '$' + n.toFixed(2);
}
function fmtFull(n) {
  return '$' + Math.round(n).toLocaleString('en-US');
}
function trim(s) { return s.replace(/\.?0+$/, ''); }

function fmtCount(n) {
  if (n >= 1e9) return trim((n/1e9).toFixed(1)) + 'B';
  if (n >= 1e6) return trim((n/1e6).toFixed(1)) + 'M';
  if (n >= 1e3) return trim((n/1e3).toFixed(1)) + 'K';
  return String(n);
}

// Milestone flash tracking
const MILESTONE_PCTS          = [25, 50, 75, 90, 99];
let triggeredProgressMilestones = new Set();

function checkProgressMilestone(pct) {
  for (const m of MILESTONE_PCTS) {
    if (pct >= m && !triggeredProgressMilestones.has(m)) {
      triggeredProgressMilestones.add(m);
      const fill = document.getElementById('pfill');
      fill.classList.remove('milestone-flash');
      void fill.offsetWidth;
      fill.classList.add('milestone-flash');
      fill.addEventListener('animationend', () => fill.classList.remove('milestone-flash'), { once: true });
      break;
    }
  }
}

function checkAchievements({ isBuy, isSell, isWin, pct, item, bulk } = {}) {
  const spent = sc ? sc.budget - remaining : 0;
  const totalBought = items.reduce((s, i) => s + i.count, 0);

  const unlock = id => {
    if (!achievementsEarned.has(id)) {
      achievementsEarned.add(id);
      const a = ACHIEVEMENTS.find(a => a.id === id);
      if (a) showToast(a.icon, a.title, a.sub);
      renderAchievementsModal();
    }
  };

  if (isBuy && totalBought === 1)                                        unlock('first_buy');
  if (isBuy && totalBought === 1 && item && item.p < 10)                 unlock('cheap_first');
  if (isBuy && totalBought === 1 && item && item.p >= 1_000_000)         unlock('big_first');
  if (isSell)                                                             unlock('sold_one');
  if (totalBought >= 10)                                                  unlock('buy_10');
  if (totalBought >= 50)                                                  unlock('buy_50');
  if (totalBought >= 100)                                                 unlock('buy_100');
  if (spent >= 1_000_000)                                                 unlock('spent_1m');
  if (spent >= 1_000_000_000)                                             unlock('spent_1b');
  if (sc.budget >= 1e12 && spent >= 1_000_000_000_000)                   unlock('spent_1t');
  if (isBuy && item && item.p >= 1_000_000_000)                          unlock('big_item');
  if (isBuy && item && item.maxQty != null && item.count >= item.maxQty) unlock('maxed_item');
  if (isBuy && items.some(i => i.count >= 10))                           unlock('hoarder');
  if (isBuy && items.some(i => i.count >= 100))                          unlock('hoarder_100');
  if (isBuy && items.filter(i => i.count >= 1).length >= 10)             unlock('diverse');
  if (pct !== undefined && pct >= 50)                                     unlock('halfway');
  if (pct !== undefined && pct >= 90)                                     unlock('almost_broke');

  // Skill achievements
  if (isBuy && totalBought === 1) firstBuyTime = Date.now();
  if (isBuy && totalBought === 1 && item && item.p >= sc.budget * 0.1)   unlock('high_roller');
  if (isBuy && item && item.p >= sc.budget * 0.5)                        unlock('all_in');
  if (bulk && bulk >= 50)                                                 unlock('bulk_buyer');
  if (isWin && items.filter(i => i.count > 0).length <= 3)               unlock('minimalist');
  if (isWin && remaining < 1)                                             unlock('precision');
  if (isWin && firstBuyTime && (Date.now() - firstBuyTime) < 60_000)     unlock('speed_run');

  if (isWin)                                                              unlock('win');

  // Completionist — check after all others, exclude itself and budget-gated ones if not applicable
  const visible = ACHIEVEMENTS.filter(a =>
    a.id !== 'completionist' &&
    (a.id !== 'spent_1t' || sc.budget >= 1e12)
  );
  if (visible.every(a => achievementsEarned.has(a.id)))                  unlock('completionist');
}

let toastStagger = 0;

function showToast(icon, title, sub) {
  const delay = toastStagger;
  toastStagger += 120;
  setTimeout(() => { toastStagger = Math.max(0, toastStagger - 120); }, delay + 400);

  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML =
    `<div class="toast-icon">${icon}</div>` +
    `<div class="toast-body">` +
      `<div class="toast-title">${title}</div>` +
      `<div class="toast-sub">${sub}</div>` +
    `</div>`;
  container.appendChild(toast);

  // staggered slide in
  setTimeout(() => {
    requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('visible')));
  }, delay);

  // slide out + collapse after 3s (from when it actually appeared), then remove
  setTimeout(() => {
    toast.classList.remove('visible');
    toast.classList.add('hiding');
    setTimeout(() => toast.remove(), 400);
  }, delay + 3000);
}

function renderAchievementsModal() {
  const grid  = document.getElementById('achGrid');
  const count = document.getElementById('achCount');
  if (!grid) return;
  grid.innerHTML = '';
  const visibleAchievements = ACHIEVEMENTS.filter(a => {
    if (a.id === 'spent_1t' && sc && sc.budget < 1e12) return false;
    if (a.id === 'spent_1b' && sc && sc.budget < 1e9)  return false;
    return true;
  });
  count.textContent = achievementsEarned.size + ' / ' + visibleAchievements.length + ' unlocked';
  visibleAchievements.forEach(a => {
    const row = document.createElement('div');
    row.className = 'ach-row' + (achievementsEarned.has(a.id) ? ' earned' : '');
    row.innerHTML =
      `<div class="ach-row-icon">${a.icon}</div>` +
      `<div class="ach-row-body">` +
        `<div class="ach-row-title">${a.title}</div>` +
        `<div class="ach-row-sub">${a.sub}</div>` +
      `</div>` +
      `<div class="ach-row-badge">Unlocked</div>` +
      `<div class="ach-row-hint">${a.hint}</div>`;
    grid.appendChild(row);
  });
}

// ── SCENARIO SWITCH ───────────────────────────────────────────────────────────

function switchScenario(id, silent) {
  sc = SCENARIOS.find(s => s.id === id);
  items = sc.items
    .slice()
    .sort((a, b) => a.p - b.p)
    .map(it => ({ ...it, count: 0 }));
  remaining = sc.budget;

  document.body.className = sc.cls;
  document.getElementById('scLabel').innerHTML = sc.label;

  // reset achievements, skill tracking, milestones
  achievementsEarned = new Set();
  firstBuyTime = 0; bulkMax = 0;
  triggeredProgressMilestones = new Set();
  document.getElementById('toastContainer').innerHTML = '';
  renderAchievementsModal();

  renderGrid();
  updateHeader();
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('intro').classList.add('hidden');
  if (!silent) SFX.play('scenarioSwitch');
}

function buy(id) {
  const it   = items.find(i => i.id === id);
  const card = document.getElementById('c-' + id);
  if (!it) return;
  if (it.impossible || it.p > remaining) {
    SFX.play('denied');
    shakeCard(id);
    shakeBalance();
    return;
  }
  if (it.maxQty != null && it.count >= it.maxQty) {
    SFX.play('denied');
    shakeCard(id);
    return;
  }
  it.count++;
  remaining = Math.round((remaining - it.p) * 1e6) / 1e6;
  updateCard(id);
  updateHeader('buy');
  recheckBuyBtns(id);
  pulseCard(id);
  if (card) squishBtn(card, 'buy');
  flyEmoji(id, 1);
  checkAchievements({ isBuy: true, item: it });
  if (!checkWin()) SFX.play('buy');
}

function sell(id) {
  const it   = items.find(i => i.id === id);
  const card = document.getElementById('c-' + id);
  if (!it || it.count === 0) return;
  it.count--;
  remaining = Math.round((remaining + it.p) * 1e6) / 1e6;
  updateCard(id);
  updateHeader('sell');
  recheckBuyBtns(id);
  if (card) squishBtn(card, 'sell');
  checkAchievements({ isSell: true });
  SFX.play('sell');
}

function pulseCard(id) {
  const card = document.getElementById('c-' + id);
  if (!card) return;
  card.classList.remove('pulse-buy');
  void card.offsetWidth;
  card.classList.add('pulse-buy');
}

function shakeCard(id) {
  const card = document.getElementById('c-' + id);
  if (!card) return;
  card.classList.remove('card-shake');
  void card.offsetWidth;
  card.classList.add('card-shake');
  card.addEventListener('animationend', () => card.classList.remove('card-shake'), { once: true });
}

function shakeBalance() {
  const el = document.getElementById('bal');
  el.classList.remove('bal-shake');
  void el.offsetWidth;
  el.classList.add('bal-shake');
  el.addEventListener('animationend', () => el.classList.remove('bal-shake'), { once: true });
}

function squishBtn(card, type) {
  const btn = card.querySelector(type === 'buy' ? '.btn-buy' : '.btn-sell');
  if (!btn) return;
  btn.classList.remove('btn-squish');
  void btn.offsetWidth;
  btn.classList.add('btn-squish');
  btn.addEventListener('animationend', () => btn.classList.remove('btn-squish'), { once: true });
}

function flyEmoji(id, count = 1) {
  const numFlyers = count >= 10 ? 5 : count >= 5 ? 3 : 1;
  for (let i = 0; i < numFlyers; i++) {
    setTimeout(() => _launchEmoji(id, i, numFlyers, i === numFlyers - 1), i * 90);
  }
}

function _launchEmoji(id, index, total, isLast) {
  const card = document.getElementById('c-' + id);
  if (!card) return;
  const emojiEl = card.querySelector('.card-emoji');
  const target  = document.getElementById('spent-display');
  if (!emojiEl || !target) return;

  const srcRect = emojiEl.getBoundingClientRect();
  const tgtRect = target.getBoundingClientRect();

  const fly = document.createElement('div');
  fly.className = 'fly-emoji';
  fly.textContent = emojiEl.textContent;

  // Fan spread: offset each emoji slightly in the source
  const spread = total > 1 ? (index - (total - 1) / 2) * 14 : 0;
  const startX = srcRect.left + spread;
  const startY = srcRect.top;
  fly.style.left = startX + 'px';
  fly.style.top  = startY + 'px';

  const endX = tgtRect.left + tgtRect.width  / 2 - 14;
  const endY = tgtRect.top  + tgtRect.height / 2 - 14;
  fly.style.setProperty('--dx', (endX - startX) + 'px');
  fly.style.setProperty('--dy', (endY - startY) + 'px');

  document.body.appendChild(fly);
  requestAnimationFrame(() => requestAnimationFrame(() => fly.classList.add('flying')));

  if (isLast) {
    setTimeout(() => {
      const sp = document.getElementById('spent-display');
      sp.classList.remove('spent-pop');
      void sp.offsetWidth;
      sp.classList.add('spent-pop');
      spawnMoneyBurst(sp);
    }, 480);
  }

  setTimeout(() => fly.remove(), 650);
}

function spawnMoneyBurst(targetEl) {
  const rect = targetEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const emojis = ['💸','💵','💰','🪙','💲'];
  for (let i = 0; i < 6; i++) {
    const m = document.createElement('div');
    m.className = 'money-burst';
    m.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    m.style.left = cx + 'px';
    m.style.top = cy + 'px';
    const angle = (Math.PI * 2 / 6) * i + (Math.random() - 0.5) * 0.5;
    const dist = 30 + Math.random() * 40;
    m.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
    m.style.setProperty('--by', Math.sin(angle) * dist + 'px');
    document.body.appendChild(m);
    setTimeout(() => m.remove(), 750);
  }
}

function updateCard(id) {
  const it   = items.find(i => i.id === id);
  const card = document.getElementById('c-' + id);
  if (!card) return;
  const inp = card.querySelector('.qty-inp');
  if (document.activeElement !== inp) inp.value = it.count;
  inp.classList.toggle('nonzero', it.count > 0);
  card.querySelector('.btn-sell').disabled = it.count === 0;
  card.classList.toggle('owned', it.count > 0);
  card.classList.toggle('maxed', it.maxQty != null && it.count >= it.maxQty);
  if (it.count === 0) { card.style.borderColor = ''; card.style.opacity = ''; }
}

function setQty(id, rawVal) {
  const it = items.find(i => i.id === id);
  if (!it || it.impossible) return;
  let desired = Math.max(0, Math.floor(Number(rawVal)) || 0);
  if (it.maxQty != null) desired = Math.min(desired, it.maxQty);
  const delta = desired - it.count;
  if (delta > 0) {
    const canBuy = Math.floor(remaining / it.p);
    desired = it.count + Math.min(delta, canBuy);
  }
  const actual = desired - it.count;
  if (actual === 0) { updateCard(id); return; }
  if (actual > 0) bulkMax = Math.max(bulkMax, actual);
  remaining = Math.round((remaining - actual * it.p) * 1e6) / 1e6;
  it.count = desired;
  updateCard(id);
  updateHeader(actual > 0 ? 'buy' : 'sell');
  recheckBuyBtns(id);
  if (actual > 0) {
    const card = document.getElementById('c-' + id);
    pulseCard(id);
    flyEmoji(id, actual);
    if (card) squishBtn(card, 'buy');
    checkAchievements({ isBuy: true, item: it, bulk: actual });
    if (!checkWin()) SFX.play(Math.abs(actual) > 1 ? 'bulkBuy' : 'buy');
  } else {
    const card = document.getElementById('c-' + id);
    if (card) squishBtn(card, 'sell');
    checkAchievements({ isSell: true });
    SFX.play(Math.abs(actual) > 1 ? 'bulkSell' : 'sell');
  }
}

function recheckBuyBtns(sourceId) {
  // Batch-read all rects before any writes to avoid layout thrashing
  const entries = items.map(it => {
    const card = document.getElementById('c-' + it.id);
    if (!card) return null;
    const atMax    = it.maxQty != null && it.count >= it.maxQty;
    const canBuy   = !it.impossible && !atMax && it.p <= remaining;
    const nowBroke = !it.impossible && !canBuy && it.count === 0;
    const wasBroke = card.classList.contains('broke');
    const rect     = (sourceId && !nowBroke && wasBroke) ? card.getBoundingClientRect() : null;
    return { it, card, canBuy, nowBroke, wasBroke, rect };
  }).filter(Boolean);

  // Source centre (only needed for wave-pop, i.e. broke→not-broke)
  let srcCx = 0, srcCy = 0;
  if (sourceId) {
    const src = document.getElementById('c-' + sourceId);
    if (src) { const r = src.getBoundingClientRect(); srcCx = r.left + r.width/2; srcCy = r.top + r.height/2; }
  }

  entries.forEach(({ it, card, canBuy, nowBroke, wasBroke, rect }) => {
    // Button state — always instant
    card.querySelector('.btn-buy').disabled = !canBuy;

    // Dim owned items that can no longer be purchased — match .maxed look
    if (it.count > 0 && !canBuy) {
      card.style.borderColor = 'rgba(128,128,128,0.2)';
      card.style.opacity = '0.4';
    } else if (it.count > 0) {
      card.style.borderColor = '';
      card.style.opacity = '';
    }

    if (it.impossible) return;

    if (nowBroke === wasBroke) return;

    if (nowBroke) {
      // Going broke — instant, no delay (prevents stale timeouts lighting cards back up)
      card.classList.add('broke');
    } else {
      // Becoming affordable — wave-pop with distance delay
      card.classList.remove('broke');
      if (sourceId && rect) {
        const delay = Math.min(Math.hypot(rect.left + rect.width/2 - srcCx, rect.top + rect.height/2 - srcCy) * 0.28, 260);
        setTimeout(() => {
          card.classList.remove('wave-pop');
          void card.offsetWidth;
          card.classList.add('wave-pop');
          card.addEventListener('animationend', () => card.classList.remove('wave-pop'), { once: true });
        }, delay);
      }
    }
  });
}

function odometer(el, newText) {
  const existing = [...el.querySelectorAll('.od-char')];
  const oldText  = existing.map(s => s.dataset.v).join('');
  if (oldText === newText) return;

  if (existing.length !== newText.length) {
    // Length changed — rebuild all chars, each rolls in
    el.innerHTML = '';
    for (const ch of newText) {
      const s = document.createElement('span');
      s.className = 'od-char od-in';
      s.dataset.v = ch;
      s.textContent = ch;
      s.addEventListener('animationend', () => s.classList.remove('od-in'), { once: true });
      el.appendChild(s);
    }
    return;
  }

  // Same length — only animate the chars that actually changed
  existing.forEach((s, i) => {
    const ch = newText[i];
    if (s.dataset.v === ch) return;
    s.dataset.v = ch;
    s.classList.remove('od-in', 'od-out');
    void s.offsetWidth;
    s.classList.add('od-out');
    setTimeout(() => {
      s.textContent = ch;
      s.classList.remove('od-out');
      s.classList.add('od-in');
      s.addEventListener('animationend', () => s.classList.remove('od-in'), { once: true });
    }, 100);
  });
}

function updateHeader(flash) {
  const el = document.getElementById('bal');
  odometer(el, window.innerWidth <= 600 ? fmt(remaining) : fmtFull(remaining));
  el.title = fmtFull(remaining);
  if (flash) {
    el.classList.remove('flash-buy', 'flash-sell');
    void el.offsetWidth;
    el.classList.add(flash === 'buy' ? 'flash-buy' : 'flash-sell');
  }
  const spent   = sc.budget - remaining;
  const pct     = Math.min(100, (spent / sc.budget) * 100);
  const spentEl = document.getElementById('spent-display');
  odometer(spentEl, window.innerWidth <= 600 ? fmt(spent) : fmtFull(spent));
  spentEl.title = fmtFull(spent);
  document.getElementById('pfill').style.width = pct + '%';
  if (flash === 'buy') {
    checkProgressMilestone(pct);
    checkAchievements({ pct });
  }
}

function checkWin() {
  const affordable = items.filter(i => !i.impossible);
  const cheapest   = Math.min(...affordable.map(i => i.p));
  if (remaining < cheapest) {
    SFX.play('win');
    launchConfetti();
    checkAchievements({ isWin: true });
    openSummary(true);
    return true;
  }
  return false;
}

// ── SUMMARY / OVERLAY ────────────────────────────────────────────────────────

function openSummary(isEnd) {
  const bought = items.filter(i => i.count > 0);
  const spent  = sc.budget - remaining;

  document.getElementById('mtitle').textContent = isEnd
    ? sc.endTitle
    : (bought.length === 0 ? "🤔 Nothing bought yet!" : "📋 Your Spending Summary");

  document.getElementById('msub').textContent = isEnd
    ? sc.endSub
    : (bought.length === 0
        ? "Go spend some money!"
        : fmt(spent) + " spent of " + fmt(sc.budget));

  const receipt = document.getElementById('receipt');
  receipt.innerHTML = '';

  if (bought.length === 0) {
    receipt.innerHTML = '<div class="receipt-empty">Your cart is empty. Get shopping!</div>';
  } else {
    bought.forEach(it => {
      const row = document.createElement('div');
      row.className = 'receipt-row';
      row.innerHTML =
        `<div class="receipt-name"><span>${it.e}</span><span>${it.count > 1 ? fmtCount(it.count) + '× ' : ''}${it.n}</span></div>` +
        `<div class="receipt-total">${fmt(it.count * it.p)}</div>`;
      receipt.appendChild(row);
    });
    const total = document.createElement('div');
    total.className = 'receipt-row';
    total.innerHTML = `<div>Total spent</div><div class="receipt-total">${fmt(spent)}</div>`;
    receipt.appendChild(total);
  }

  // Show achievements overview on win
  if (isEnd) {
    const achDiv = document.createElement('div');
    achDiv.style.cssText = 'margin-bottom:1.5rem;';

    const visibleAch = ACHIEVEMENTS.filter(a =>
      a.id !== 'spent_1t' || (sc && sc.budget >= 1e12)
    );
    const earned = visibleAch.filter(a => achievementsEarned.has(a.id));

    achDiv.innerHTML =
      `<div style="font:800 0.85rem/1 var(--font-body);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:0.6rem;">` +
        `🏆 Achievements — ${earned.length} / ${visibleAch.length}` +
      `</div>` +
      `<div style="display:flex;flex-wrap:wrap;gap:0.35rem;">` +
        visibleAch.map(a => {
          const got = achievementsEarned.has(a.id);
          return `<span title="${a.title}: ${a.sub}" style="` +
            `display:inline-flex;align-items:center;gap:0.3rem;` +
            `padding:0.25rem 0.5rem;border-radius:6px;font-size:0.65rem;font-weight:700;` +
            `background:${got ? 'var(--surface3)' : 'var(--surface2)'};` +
            `border:1px solid ${got ? 'var(--border-hover)' : 'var(--border)'};` +
            `opacity:${got ? '1' : '0.35'};` +
          `">${a.icon} ${a.title}</span>`;
        }).join('') +
      `</div>`;
    receipt.parentNode.insertBefore(achDiv, receipt.nextSibling);
  }

  SFX.play('openPanel');
  document.getElementById('overlay').classList.add('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) {
    SFX.play('closePanel');
    document.getElementById('overlay').classList.remove('open');
  }
}

function closeOverlay() { SFX.play('continueSpending'); document.getElementById('overlay').classList.remove('open'); }

function resetCurrent() {
  SFX.play('reset');
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('intro').classList.remove('hidden');
}

// ── RENDER GRID ──────────────────────────────────────────────────────────────

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  items.forEach(it => {
    const card = document.createElement('div');
    card.className = 'card' + (it.impossible ? ' impossible broke' : '');
    card.id = 'c-' + it.id;
    card.innerHTML =
      `<div class="card-emoji">${it.e}</div>` +
      `<div class="card-name">${it.n}</div>` +
      `<div class="card-price">${fmt(it.p)}</div>` +
      `<div class="card-desc">${it.d}</div>` +
      `<div class="card-controls">` +
        `<button class="btn-q btn-sell" onclick="sell('${it.id}')" disabled>−</button>` +
        `<input type="number" class="qty-inp" value="0" min="0"` +
          ` onchange="setQty('${it.id}',this.value)"` +
          ` onblur="setQty('${it.id}',this.value)"` +
          ` onfocus="this.select()">` +
        `<button class="btn-q btn-buy" onclick="buy('${it.id}')"${it.impossible ? ' disabled' : ''}>+</button>` +
      `</div>`;
    grid.appendChild(card);
  });
  recheckBuyBtns();
  updateHeader();
}

// ── INIT ─────────────────────────────────────────────────────────────────────

// Build intro options from scenario data
const introEl = document.getElementById('introOptions');
SCENARIOS.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'intro-opt';
  btn.dataset.id = s.id;
  btn.innerHTML =
    `<div class="intro-opt-icon">${s.label.split(' ')[0]}</div>` +
    `<div class="intro-opt-text">` +
      `<div class="intro-opt-name">${s.label.replace(/^[^\s]+\s/, '')}</div>` +
      `<div class="intro-opt-detail">${s.tagline}</div>` +
    `</div>` +
    `<div class="intro-opt-budget">${fmt(s.budget)}</div>`;
  btn.onclick = () => switchScenario(s.id);
  introEl.appendChild(btn);
});

document.getElementById('muteBtn').textContent = SFX.isMuted() ? '🔇' : '🔊';
createIntroParticles();

// Re-render header numbers on resize (e.g. rotation changes between full/abbreviated)
window.addEventListener('resize', () => { if (sc) updateHeader(); }, { passive: true });
</script>
