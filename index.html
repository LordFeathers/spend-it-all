<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spend It All</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #00d4ff;
      --accent-dim: rgba(0,212,255,0.12);
      --accent-glow: rgba(0,212,255,0.25);
      --bg: #07090f;
      --surface: #0d1117;
      --surface2: #161b27;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #2d3748;
    }
    body.s-debt    { --accent:#ff4d4d; --accent-dim:rgba(255,77,77,.12); --accent-glow:rgba(255,77,77,.25); }
    body.s-powerball{ --accent:#ffd700; --accent-dim:rgba(255,215,0,.12); --accent-glow:rgba(255,215,0,.25); }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(7,9,15,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 1.5rem 0.85rem;
    }
    .header-top { margin-bottom: 0.6rem; }
    .site-title {
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--accent);
      transition: color 0.35s, opacity 0.15s;
      cursor: pointer;
      user-select: none;
      line-height: 1;
      white-space: nowrap;
    }
    .site-title:hover { opacity: 0.7; }
    .balance-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin: 1rem 0 0.55rem;
    }
    .stat { text-align: center; line-height: 1; }
    .stat-num {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      transition: color 0.35s;
      line-height: 1;
    }
    .stat-num.stat-spent {
      font-size: 2rem;
      color: var(--text-muted);
    }
    .stat-lbl {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      margin-top: 0.2rem;
    }
    .stat-divider {
      width: 1px;
      height: 2.5rem;
      background: var(--border);
      flex-shrink: 0;
    }

    /* Scenario cards — compact horizontal pills */
    .scenario-picker {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }
    .sc-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.5rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
    }
    .sc-card:hover { border-color: var(--accent); background: var(--accent-dim); }
    .sc-card.active {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 10px var(--accent-glow);
    }
    .sc-emoji { font-size: 1.2rem; line-height: 1; }
    .sc-name { font-size: 0.85rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sc-card.active .sc-name { color: var(--accent); }
    .sc-budget { display: none; }
    .tagline { display: none; }
    .progress-track {
      margin-top: 0.6rem;
      height: 5px;
      background: var(--surface2);
      border-radius: 9999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 9999px;
      transition: width 0.35s ease, background 0.35s;
    }
    .progress-lbl {
      margin-top: 0.3rem;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    @keyframes flashBuy  { 0%,100%{color:var(--accent)} 40%{color:#ff5555} }
    @keyframes flashSell { 0%,100%{color:var(--accent)} 40%{color:#4ade80} }
    .flash-buy  { animation: flashBuy  0.35s ease; }
    .flash-sell { animation: flashSell 0.35s ease; }

    /* ── GRID ───────────────────────────────────────────── */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 0.85rem;
    }

    /* ── CARD ───────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s, opacity 0.2s, filter 0.2s;
      position: relative;
    }
    .card:not(.impossible):not(.broke):hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px var(--accent-dim);
    }
    .card.owned {
      border-color: var(--accent);
      background: linear-gradient(140deg, var(--surface), var(--surface2));
    }
    .card.broke { opacity: 0.38; filter: grayscale(0.6); }
    .card.impossible { opacity: 0.28; cursor: default; }

    .card-emoji { font-size: 2.25rem; line-height: 1; }
    .card-name {
      font-size: 0.875rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
    }
    .card-price {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      transition: color 0.35s;
    }
    .card-desc {
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1.45;
      flex: 1;
    }
    .impossible-badge {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: rgba(255,68,68,0.15);
      color: #f87171;
      border: 1px solid rgba(255,68,68,0.35);
      border-radius: 4px;
      padding: 0.1rem 0.35rem;
      margin-left: 0.3rem;
      vertical-align: middle;
    }

    .card-controls {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.3rem;
    }
    .btn-q {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font: 700 1.1rem/1 inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .btn-q:not(:disabled):hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .btn-q:disabled { opacity: 0.25; cursor: not-allowed; }
    .btn-buy:not(:disabled) { border-color: var(--accent); color: var(--accent); }

    .qty-inp {
      flex: 1;
      min-width: 0;
      text-align: center;
      font: 700 0.95rem/1 inherit;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      cursor: text;
      transition: color 0.15s, background 0.15s;
      border-radius: 4px;
      padding: 2px 0;
    }
    .qty-inp:focus {
      background: var(--surface2);
      color: var(--text);
    }
    .qty-inp.nonzero { color: var(--accent); }
    /* hide spin arrows */
    .qty-inp::-webkit-inner-spin-button,
    .qty-inp::-webkit-outer-spin-button { -webkit-appearance: none; }
    .qty-inp[type=number] { -moz-appearance: textfield; appearance: textfield; }

    /* ── ACTIONS BAR ─────────────────────────────────────── */
    .actions-bar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1.5rem 2.5rem;
      display: flex;
      justify-content: center;
    }
    .btn-summary {
      padding: 0.55rem 1.4rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 9999px;
      font: 600 0.82rem/1 inherit;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-summary:hover { border-color: var(--accent); color: var(--accent); }

    /* ── OVERLAY ─────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(14px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 2rem;
      max-width: 560px;
      width: 100%;
      max-height: 82vh;
      overflow-y: auto;
      box-shadow: 0 0 60px var(--accent-glow);
      transition: border-color 0.35s, box-shadow 0.35s;
    }
    .modal-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 0.35rem; }
    .modal-sub { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1.5rem; }

    .receipt { display: flex; flex-direction: column; margin-bottom: 1.5rem; }
    .receipt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      gap: 0.5rem;
    }
    .receipt-row:last-child { border-bottom: none; font-weight: 700; font-size: 0.95rem; }
    .receipt-name { display: flex; align-items: center; gap: 0.45rem; min-width: 0; }
    .receipt-name span:last-child { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .receipt-total { color: var(--accent); font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; transition: color 0.35s; }
    .receipt-empty { text-align: center; padding: 1.5rem; color: var(--text-muted); font-size: 0.875rem; }

    .modal-btns { display: flex; gap: 0.6rem; }
    .btn-continue {
      flex: 1;
      padding: 0.8rem;
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
      border-radius: 10px;
      font: 800 0.95rem/1 inherit;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-continue:hover { background: var(--accent-dim); }
    .btn-reset {
      flex: 1;
      padding: 0.8rem;
      background: var(--accent);
      color: #000;
      border: 2px solid var(--accent);
      border-radius: 10px;
      font: 800 0.95rem/1 inherit;
      cursor: pointer;
      transition: opacity 0.2s, background 0.35s, border-color 0.35s;
    }
    .btn-reset:hover { opacity: 0.82; }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 600px) {
      .header-inner { padding: 0.5rem 0.85rem; }
      .site-title { font-size: 1rem; }
      .balance-num { font-size: 1.45rem; }
      .sc-name { font-size: 0.65rem; }
      .main { padding: 1rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.65rem; }
      .actions-bar { padding: 0 1rem 2rem; }
      .modal-btns { flex-direction: column; }
    }
  </style>
</head>

    <div class="tagline" id="tagline"></div>
  </div>
</header>

<!-- ── GRID ───────────────────────────────── -->
<div class="main">
  <div class="grid" id="grid"></div>
</div>

<div class="actions-bar">
  <button class="btn-summary" onclick="openSummary(false)">📋 View Spending Summary</button>
</div>

<div style="text-align:center;padding:1rem 0 2rem;font-size:0.75rem;color:#374151;">Made by Yaakov Sassoon</div>

<!-- ── OVERLAY ────────────────────────────── -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">

    <div class="modal-sub"   id="msub"></div>

      <button class="btn-continue" onclick="closeOverlay()">Continue Spending</button>
      <button class="btn-reset"    onclick="resetCurrent()">Start Over</button>
    </div>
  </div>
</div>

// ── STATE ─────────────────────────────────────────────────────────────────────

let sc        = null;
let items     = [];
let remaining = 0;

// ── HELPERS ───────────────────────────────────────────────────────────────────

function fmt(n) {
  if (n >= 1e15) return '$' + trim((n/1e15).toFixed(1)) + ' quadrillion';
  if (n >= 1e12) return '$' + trim((n/1e12).toFixed(3)) + 'T';
  if (n >= 1e9)  return '$' + trim((n/1e9 ).toFixed(3)) + 'B';
  if (n >= 1e6)  return '$' + trim((n/1e6 ).toFixed(3)) + 'M';
  if (n >= 1e3)  return '$' + Math.round(n).toLocaleString('en-US');
  return '$' + n.toFixed(2);
}
function trim(s) { return s.replace(/\.?0+$/, ''); }

function fmtCount(n) {
  if (n >= 1e9) return trim((n/1e9).toFixed(1)) + 'B';
  if (n >= 1e6) return trim((n/1e6).toFixed(1)) + 'M';
  if (n >= 1e3) return trim((n/1e3).toFixed(1)) + 'K';
  return String(n);
}

// ── CORE ──────────────────────────────────────────────────────────────────────

function switchScenario(id) {
  sc = SCENARIOS.find(s => s.id === id);
  items = sc.items.map(it => ({ ...it, count: 0 }));
  remaining = sc.budget;

  document.body.className = sc.cls;
  document.querySelectorAll('.sc-card').forEach(t => t.classList.toggle('active', t.dataset.id === id));
  document.getElementById('tagline').textContent = sc.tagline;

  renderGrid();
  updateHeader();
  document.getElementById('overlay').classList.remove('open');
}

function buy(id) {
  const it = items.find(i => i.id === id);
  if (!it || it.impossible || it.p > remaining) return;
  it.count++;
  remaining = Math.round((remaining - it.p) * 1e6) / 1e6;
  updateCard(id);
  updateHeader('buy');
  recheckBuyBtns();
  checkWin();
}

function sell(id) {
  const it = items.find(i => i.id === id);
  if (!it || it.count === 0) return;
  it.count--;
  remaining = Math.round((remaining + it.p) * 1e6) / 1e6;
  updateCard(id);
  updateHeader('sell');
  recheckBuyBtns();
}

function updateCard(id) {
  const it   = items.find(i => i.id === id);
  const card = document.getElementById('c-' + id);
  if (!card) return;
  const inp = card.querySelector('.qty-inp');
  if (document.activeElement !== inp) inp.value = it.count;
  inp.classList.toggle('nonzero', it.count > 0);
  card.querySelector('.btn-sell').disabled = it.count === 0;
  card.classList.toggle('owned', it.count > 0);
}

function setQty(id, rawVal) {
  const it = items.find(i => i.id === id);
  if (!it || it.impossible) return;
  let desired = Math.max(0, Math.floor(Number(rawVal)) || 0);
  const delta = desired - it.count;
  if (delta > 0) {
    const canBuy = Math.floor(remaining / it.p);
    desired = it.count + Math.min(delta, canBuy);
  }
  const actual = desired - it.count;
  if (actual === 0) { updateCard(id); return; }
  remaining = Math.round((remaining - actual * it.p) * 1e6) / 1e6;
  it.count = desired;
  updateCard(id);
  updateHeader(actual > 0 ? 'buy' : 'sell');
  recheckBuyBtns();
  if (actual > 0) checkWin();
}

function recheckBuyBtns() {
  items.forEach(it => {
    const card = document.getElementById('c-' + it.id);
    if (!card) return;
    const canBuy = !it.impossible && it.p <= remaining;
    card.querySelector('.btn-buy').disabled = !canBuy;
    if (!it.impossible) card.classList.toggle('broke', !canBuy && it.count === 0);
  });
}

function updateHeader(flash) {
  const el = document.getElementById('bal');
  el.textContent = fmt(remaining);
  if (flash) {
    el.classList.remove('flash-buy', 'flash-sell');
    void el.offsetWidth;
    el.classList.add(flash === 'buy' ? 'flash-buy' : 'flash-sell');
  }
  const spent = sc.budget - remaining;
  const pct   = Math.min(100, (spent / sc.budget) * 100);
  document.getElementById('spent-display').textContent = fmt(spent);
  document.getElementById('pfill').style.width = pct + '%';
}

function checkWin() {
  const affordable = items.filter(i => !i.impossible);
  const cheapest   = Math.min(...affordable.map(i => i.p));
  if (remaining < cheapest) openSummary(true);
}

// ── SUMMARY / OVERLAY ─────────────────────────────────────────────────────────

function openSummary(isEnd) {
  const bought = items.filter(i => i.count > 0);
  const spent  = sc.budget - remaining;

  document.getElementById('mtitle').textContent = isEnd
    ? sc.endTitle
    : (bought.length === 0 ? "🤔 Nothing bought yet!" : "📋 Your Spending Summary");

  document.getElementById('msub').textContent = isEnd
    ? sc.endSub
    : (bought.length === 0
        ? "Go spend some money!"
        : fmt(spent) + " spent of " + fmt(sc.budget));

  const receipt = document.getElementById('receipt');
  receipt.innerHTML = '';

  if (bought.length === 0) {
    receipt.innerHTML = '<div class="receipt-empty">Your cart is empty. Get shopping!</div>';
  } else {
    bought.forEach(it => {
      const row = document.createElement('div');
      row.className = 'receipt-row';
      row.innerHTML =
        `<div class="receipt-name"><span>${it.e}</span><span>${it.count > 1 ? fmtCount(it.count) + '× ' : ''}${it.n}</span></div>` +
        `<div class="receipt-total">${fmt(it.count * it.p)}</div>`;
      receipt.appendChild(row);
    });
    const total = document.createElement('div');
    total.className = 'receipt-row';
    total.innerHTML = `<div>Total spent</div><div class="receipt-total">${fmt(spent)}</div>`;
    receipt.appendChild(total);
  }

  document.getElementById('overlay').classList.add('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('open'); }

function resetCurrent() { switchScenario(sc.id); }

// ── RENDER GRID ───────────────────────────────────────────────────────────────

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  items.forEach(it => {
    const card = document.createElement('div');
    card.className = 'card' + (it.impossible ? ' impossible broke' : '');
    card.id = 'c-' + it.id;
    card.innerHTML =
      `<div class="card-emoji">${it.e}</div>` +
      `<div class="card-name">${it.n}</div>` +
      `<div class="card-price">${fmt(it.p)}${it.impossible ? '<span class="impossible-badge">impossible</span>' : ''}</div>` +
      `<div class="card-desc">${it.d}</div>` +
      `<div class="card-controls">` +
        `<button class="btn-q btn-sell" onclick="sell('${it.id}')" disabled>−</button>` +
        `<input type="number" class="qty-inp" value="0" min="0"` +
          ` onchange="setQty('${it.id}',this.value)"` +
          ` onblur="setQty('${it.id}',this.value)"` +
          ` onfocus="this.select()">` +
        `<button class="btn-q btn-buy" onclick="buy('${it.id}')"${it.impossible ? ' disabled' : ''}>+</button>` +
      `</div>`;
    grid.appendChild(card);
  });
  recheckBuyBtns();
  updateHeader();
}
